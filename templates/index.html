<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Bot</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b3c8a, #020617);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ✨ Floating stars */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3;
}

/* Chat container */
.chat-container {
    width: 420px;
    height: 620px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* Header */
.header {
    background: #e2e8f0;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.header-icon {
    width: 40px;
    height: 40px;
    background: #cbd5e1;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

.header-text {
    font-size: 18px;
    font-weight: bold;
    color: #1e3a8a;
}

.status-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
}

/* Chat */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    margin: 8px 0;
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 75%;
    animation: fadeIn 0.3s ease-in;
}

.user {
    background: #1e40af;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 0;
}

.bot {
    background: #cbd5e1;
    color: black;
    border-bottom-left-radius: 0;
}

/* Typing animation */
.typing {
    font-style: italic;
    opacity: 0.6;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #1e40af;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- Header -->
    <div class="header">
        <div class="header-icon">➕</div>
        <div>
            <div class="header-text">Doctor Bot</div>
            <div class="status-dot"></div>
        </div>
    </div>

    <!-- Chat -->
    <div id="chat-box" class="chat-box"></div>

    <!-- Input -->
    <div class="input-area">
        <input id="input" type="text" placeholder="Ask a medical question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function appendMessage(text, className) {
    let chatBox = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = "message " + className;
    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if (!message) return;

    appendMessage(message, "user");

    // 💬 Typing indicator
    let typingDiv = document.createElement("div");
    typingDiv.className = "message bot typing";
    typingDiv.innerText = "Typing...";
    document.getElementById("chat-box").appendChild(typingDiv);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        typingDiv.remove();
        appendMessage(data.response, "bot");
    });

    input.value = "";
}

// Enter key
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
